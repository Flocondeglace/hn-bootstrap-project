      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="container-lg bg-light">
    <header>
      <nav class="navbar navbar-expand-md">
        <div class="container-fluid">
          <div class="navbar-brand">
            <h1>Sweat Books</h1>
          </div>
          <button
            type="button"
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#navbarCollapse"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-center"
            id="navbarCollapse"
          >
            <ul class="navbar-nav">
              <li>
                <a href="index.html" class="nav-item nav-link active">Home</a>
              </li>
              <li class="btn-group">
                <a href="about.html" class="nav-item nav-link">About</a>
                <button
                  type="button"
                  class="btn dropdown-toggle"
                  data-bs-toggle="dropdown"
                ></button>

                <ul class="dropdown-menu dropdown-menu-end">
                  <li class="dropdown-header">About</li>
                  <li>
                    <a href="staff.html" class="dropdown-item">Staff</a>
                  </li>
                </ul>
              </li>
              <li>
                <a href="gallery.html#carousel_1" class="nav-item nav-link"
                  >Photo Gallery</a
                >
              </li>
              <li class="btn-group">
                <a href="products.html" class="nav-item nav-link">Products</a>
                <button
                  type="button"
                  class="btn dropdown-toggle"
                  data-bs-toggle="dropdown"
                ></button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a href="fabrics.html" class="dropdown-item">Fabrics</a>

              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div id="contact-content">
      <h2>Contact Us &#128234;</h2>
      <div>
        <form method="post" action="https://hnitest.go.yj.fr">
          <div class="row g-3">
            <div class="col">
              <label class="form-label d-block">
                Last Name
                <input
                  class="form-control"
                  id="lastname"
                  type="text"
                  name="lastname"
                  required
                  placeholder="Your last name"
              /></label>
            </div>
            <div class="col">
              <label class="form-label d-block">
                First Name
                <input
                  class="form-control"
                  id="firstname"
                  type="text"
                  name="firstname"
                  required
                  placeholder="Your first name"
                />
              </label>
            </div>
          </div>
          <div>
            <label class="form-label d-block">
              Mail
              <input
                class="form-control"
                id="mail"
                type="email"
                name="mail"
                placeholder="yourmail@yahoo.com"
                required
              />
            </label>
          </div>
          <div>
            <label class="form-label d-block">
              Request
              <textarea
                class="form-control"
                name="request"
                id="request"
                cols="66"
                rows="10"
                required
                placeholder="Your message : your question, your request for a custom-made book cover, etc."
              ></textarea>
            </label>
          </div>
          <div>
            <label class="form-label d-block">
              Country
              <select
                class="form-select"
                name="country"
                id="country"
                required
                size="1"
              >
                <option value="" disabled selected>
                  -- Choose your country --
                </option>
                <option value="France">France</option>
                <option value="Belgium">Belgium</option>
                <option value="Switzerland">Switzerland</option>
              </select>
            </label>
          </div>
          <div class="row g-3">
            <div class="col-auto">
              <label class="btn"
                >Reset &#11118; <input type="reset" hidden
              /></label>
            </div>
            <div class="col-auto">
              <label class="btn"
                >Send &#11162; <input type="submit" hidden
              /></label>
            </div>
          </div>
        </form>
      </div>
    </div>
    <footer>
      <p class="text-center"><small>&copy; 2026 Sweat Books</small></p>
    </footer>
  </body>
</html>
