<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sweat Books</title>
    <!--<link rel="stylesheet" href="css/style.css" />-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <style>
      .carousel-item {
        min-height: 280px;
        height: 280px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md">
        <div class="container-fluid">
          <div class="navbar-brand">
            <h1>Sweat Books</h1>
          </div>
          <button
            type="button"
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#navbarCollapse"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-center"
            id="navbarCollapse"
          >
            <ul class="navbar-nav">
              <li>
                <a href="index.html" class="nav-item nav-link active">Home</a>
              </li>
              <li class="btn-group">
                <a href="about.html" class="nav-item nav-link">About</a>
                <button
                  type="button"
                  class="btn dropdown-toggle"
                  data-bs-toggle="dropdown"
                ></button>

                <ul class="dropdown-menu dropdown-menu-end">
                  <li class="dropdown-header">About</li>
                  <li>
                    <a href="staff.html" class="dropdown-item">Staff</a>
                  </li>
                </ul>
              </li>
              <li>
                <a
                  href="gallery.html#carousel_1"
                  class="nav-item nav-link active"
                  >Photo Gallery</a
                >
              </li>
              <li class="btn-group">
                <a href="products.html" class="nav-item nav-link">Products</a>
                <button
                  type="button"
                  class="btn dropdown-toggle"
                  data-bs-toggle="dropdown"
                ></button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a href="fabrics.html" class="dropdown-item">Fabrics</a>
                  </li>
                </ul>
              </li>
              <li>
                <a href="contact.html" class="nav-item nav-link">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div id="gallery-content" class="container">
      <h2>Photo Gallery &#128247;</h2>
      <h3>Some of our previous creations</h3>
      <div class="container-sm">
        <div
          id="myCarousel"
          class="carousel carousel-dark slide"
          data-bs-ride="carousel"
        >
          <!-- Carousel indicators -->
          <ol class="carousel-indicators">
            <li
              data-bs-target="#myCarousel"
              data-bs-slide-to="0"
              class="active"
            ></li>
            <li data-bs-target="#myCarousel" data-bs-slide-to="1"></li>
            <li data-bs-target="#myCarousel" data-bs-slide-to="2"></li>
            <li data-bs-target="#myCarousel" data-bs-slide-to="3"></li>
          </ol>

          <!-- Wrapper for carousel items -->
          <div class="carousel-inner">
            <div class="carousel-item text-center active">
              <img
                src="images/sweat_book_1.png"
                alt="Example 1"
                class="img-fluid h-100"
              />
            </div>
            <div class="carousel-item text-center">
              <img
                src="images/sweat_book_2.png"
                alt="Example 2"
                class="img-fluid h-100"
              />
            </div>
            <div class="carousel-item text-center">
              <img
                src="images/sweat_book_3.png"
                alt="Example 3"
                class="img-fluid h-100"
              />
            </div>
            <div class="carousel-item text-center">
              <img
                src="images/sweat_book_4.png"
                alt="Example 4"
                class="img-fluid h-100"
              />
            </div>
          </div>

          <!-- Carousel controls -->
          <a
            class="carousel-control-prev"
            href="#myCarousel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </a>
          <a
            class="carousel-control-next"
            href="#myCarousel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </a>
        </div>
      </div>
    </div>

    <footer>
      <p class="text-center"><small>&copy; 2026 Sweat Books</small></p>
    </footer>
  </body>
</html>
